<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sister Funny Question</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Are you a good sister? 💖</h1>

        <div class="buttons">

            <button class="yes-btn"
                    onclick="showMessage()">
                Yes 💕
            </button>

            <button class="no-btn"
                    id="noButton"
                    onmouseover="moveButton()">
                No 😅
            </button>

        </div>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
